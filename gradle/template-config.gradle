    runtime_only           : [configuration: "runtimeOnly", deobf: false, supportsRange: false],
    annotation_processor   : [configuration: "annotationProcessor", deobf: false, supportsRange: false],
    test_implementation    : [configuration: "testImplementation", deobf: false, supportsRange: false],
    test_runtime_only      : [configuration: "testRuntimeOnly", deobf: false, supportsRange: false],
    deobf_api              : [configuration: "api", deobf: true, supportsRange: false],
    deobf_implementation   : [configuration: "implementation", deobf: true, supportsRange: false],
    deobf_compile_only_api : [configuration: "compileOnlyApi", deobf: true, supportsRange: false],
    deobf_compile_only     : [configuration: "compileOnly", deobf: true, supportsRange: false],
    deobf_runtime_only     : [configuration: "runtimeOnly", deobf: true, supportsRange: false],
    deobf_test_implementation: [configuration: "testImplementation", deobf: true, supportsRange: false],
    deobf_test_runtime_only: [configuration: "testRuntimeOnly", deobf: true, supportsRange: false],
    jarjar                 : [configuration: "jarJar", deobf: false, supportsRange: true]
] as Map<String, Map<String, Object>>
def allowedEmbeddedProjectBuckets = ["api", "implementation"] as Set
def allowedRelationBuckets = ["required", "optional", "incompatible", "discouraged", "embedded"] as Set
def allowedDisplayTests = ["MATCH_VERSION", "IGNORE_SERVER_VERSION", "IGNORE_ALL_VERSION", "NONE"] as Set
def allowedRelationOrderings = ["NONE", "BEFORE", "AFTER"] as Set
def allowedRelationSides = ["BOTH", "CLIENT", "SERVER"] as Set

def localFirstString = { String key, String defaultValue = "" ->
    def localValue = localPublishTable?.getString(key)
    if (localValue != null) {
        return localValue
    }
    optionalStringFromTable(publishTable, key, defaultValue)
}

def optionalStringArrayFromTable = { def table, String key ->
    def array = table == null ? null : table.getArray(key)
    if (array == null) {
        return []
    }

    (0..<array.size()).collect { int index ->
        def value = array.getString(index)
        if (value == null || value.isBlank()) {
            failConfig("Expected non-empty string array entries in ${key}")
        }
        value
    }
}

templateParsed.dottedKeySet().collect { it.split("\\.")[0] }.unique().each { key ->
    if (!allowedTopLevel.contains(key)) {
        failConfig("Unknown top-level key: ${key}")
    }
}

featuresTable.keySet().each { key ->
    if (!allowedFeatures.contains(key)) {
        failConfig("Unknown feature key: ${key}")
    }
    if ((featuresTable.getBoolean(key) ?: false) && !supportedFeatures.contains(key)) {
        failConfig("feature ${key} is not available on this branch")
    }
}

if (overridesTable != null) {
    overridesTable.keySet().each { key ->
        def owningFeature = allowedOverrideToFeature[key]
        if (owningFeature == null) {
            failConfig("Unknown override key: ${key}")
        }
        if (!(featuresTable.getBoolean(owningFeature) ?: false)) {
            failConfig("Override ${key} requires enabled feature ${owningFeature}")
        }
    }
}

def parseLanguagesTable = { def table ->
    def languages = [kotlin: false]
    if (table == null) {
        return languages
    }

    table.keySet().each { key ->
        if (!allowedLanguages.contains(key)) {
            failConfig("Unknown languages key: ${key}")
        }
        if (!table.isBoolean(key)) {
            failConfig("languages.${key} must be a boolean")
        }
    }

    languages.kotlin = table.getBoolean("kotlin") ?: false
    languages
}

def qualifyPath = { String prefix, String key ->
    prefix == null || prefix.isBlank() ? key : "${prefix}.${key}"
}

def parseRepositoryTable = { def table, String prefix = "" ->
    def repositories = [:]
    if (table == null) {
        return repositories
    }

    table.keySet().each { key ->
        def label = prefix == null || prefix.isBlank() ? key : qualifyPath(prefix, key)
        def repoName = key
        def repoUrl
        def groups = []
        def groupRegexes = []

        if (table.isString(key)) {
            repoUrl = table.getString(key)
        } else {
            def repositoryTable = null
            try {
                repositoryTable = table.getTable(key)
            } catch (RuntimeException ignored) {
                repositoryTable = null
            }
            if (repositoryTable == null) {
                failConfig("Repository ${label} must be a string URL or inline table")
            }

            def allowedRepoKeys = ["url", "name", "groups", "group_regexes"] as Set
            repositoryTable.keySet().each { repoKey ->
                if (!allowedRepoKeys.contains(repoKey)) {
                    failConfig("Repository ${label} has unsupported key ${repoKey}")
                }
            }

            repoUrl = repositoryTable.getString("url")
            repoName = optionalStringFromTable(repositoryTable, "name", key)
            groups = optionalStringArrayFromTable(repositoryTable, "${label}.groups")
            groupRegexes = optionalStringArrayFromTable(repositoryTable, "${label}.group_regexes")
        }

        if (repoUrl == null || repoUrl.isBlank()) {
            failConfig("Repository ${label} must be a non-empty string URL")
        }
        repositories[key] = [
            id          : key,
            name        : repoName,
            url         : repoUrl,
            groups      : groups,
            groupRegexes: groupRegexes
        ]
    }

    repositories
}

def builtinRepositories = parseRepositoryTable(builtinRepositoriesTable, "builtin_repositories")
def customRepositories = parseRepositoryTable(repositoriesTable)

def parseNotation = { String notation, String path ->
    def parts = notation.split(":", 3)
    if (parts.length != 3 || parts.any { it.isBlank() }) {
        failConfig("Dependency ${path} must use group:artifact:version notation")
    }
    [
        group   : parts[0],
        artifact: parts[1],
        version : parts[2]
    ]
}

def parseDependencyTables = { def rootTable, String prefix = "" ->
    def dependencySpecs = []
    if (rootTable == null) {
        return dependencySpecs
    }

    rootTable.keySet().each { bucketKey ->
        def bucketSpec = allowedDependencyBuckets[bucketKey]
        if (bucketSpec == null) {
            if (prefix == null || prefix.isBlank()) {
                failConfig("Unknown dependency bucket: ${bucketKey}")
            }
            failConfig("Unknown dependency bucket in ${prefix}: ${bucketKey}")
        }

        def bucketTable = rootTable.getTable(bucketKey)
        if (bucketTable == null) {
            failConfig("Dependency bucket ${qualifyPath(prefix, bucketKey)} must be a TOML table")
        }

        bucketTable.keySet().each { dependencyKey ->
            def entryPath = prefix == null || prefix.isBlank()
                ? "${bucketKey}.${dependencyKey}"
                : "${prefix}.${bucketKey}.${dependencyKey}"
            def supportsRange = bucketSpec.supportsRange as boolean
            def notation
            def transitive = true
            def range = ""
            def inlineTable = null

            if (bucketTable.isString(dependencyKey)) {
                notation = bucketTable.getString(dependencyKey)
            } else if (bucketTable.isTable(dependencyKey)) {
                inlineTable = bucketTable.getTable(dependencyKey)

                if (inlineTable.contains("notation") && !inlineTable.isString("notation")) {
                    failConfig("Dependency ${entryPath}.notation must be a string")
                }
                if (inlineTable.contains("range") && !inlineTable.isString("range")) {
                    failConfig("Dependency ${entryPath}.range must be a string")
                }
                if (inlineTable.contains("transitive") && !inlineTable.isBoolean("transitive")) {
                    failConfig("Dependency ${entryPath}.transitive must be a boolean")
                }

                notation = inlineTable.getString("notation")
                transitive = optionalBooleanFromTable(inlineTable, "transitive", true)
                range = optionalStringFromTable(inlineTable, "range")
            } else {
                failConfig("Dependency ${entryPath} must be a string or inline table")
            }

            if (notation == null || notation.isBlank()) {
                failConfig("Dependency ${entryPath} must define notation")
            }

            if (inlineTable != null) {
                def allowedEntryKeys = (supportsRange ? ["notation", "range", "transitive"] : ["notation", "transitive"]) as Set
                inlineTable.keySet().each { key ->
                    if (!allowedEntryKeys.contains(key)) {
                        failConfig("Dependency ${entryPath} has unsupported key ${key}")
                    }
                }
            } else if (supportsRange) {
                failConfig("Dependency ${entryPath} must be an inline table with notation and range")
            }

            if (supportsRange && range.isBlank()) {
                failConfig("Dependency ${entryPath} must define range")
            }
            if (!supportsRange && !range.isBlank()) {
                failConfig("Dependency ${entryPath} does not support range")
            }

            def notationParts = parseNotation(notation, entryPath)
            dependencySpecs << [
                name        : dependencyKey,
                bucket      : bucketKey,
                configuration: bucketSpec.configuration,
                deobf       : bucketSpec.deobf,
                notation    : notation,
                transitive  : transitive,
                range       : range,
                group       : notationParts.group,
                artifact    : notationParts.artifact,
                version     : notationParts.version
            ]
        }
    }

    dependencySpecs
}

def parseEmbeddedProjectTables = { def rootTable, String prefix = "embedded_projects" ->
    def embeddedProjectSpecs = []
    if (rootTable == null) {
        return embeddedProjectSpecs
    }

    rootTable.keySet().each { bucketKey ->
        if (!allowedEmbeddedProjectBuckets.contains(bucketKey)) {
            failConfig("Unknown embedded project bucket in ${prefix}: ${bucketKey}")
        }

        def bucketTable = rootTable.getTable(bucketKey)
        if (bucketTable == null) {
            failConfig("Embedded project bucket ${qualifyPath(prefix, bucketKey)} must be a TOML table")
        }

        bucketTable.keySet().each { projectKey ->
            def entryPath = "${prefix}.${bucketKey}.${projectKey}"
            def projectPath
            def configuration = ""
            def inlineTable = null

            if (bucketTable.isString(projectKey)) {
                projectPath = bucketTable.getString(projectKey)
            } else if (bucketTable.isTable(projectKey)) {
                inlineTable = bucketTable.getTable(projectKey)

                if (inlineTable.contains("path") && !inlineTable.isString("path")) {
                    failConfig("Embedded project ${entryPath}.path must be a string")
                }
                if (inlineTable.contains("configuration") && !inlineTable.isString("configuration")) {
                    failConfig("Embedded project ${entryPath}.configuration must be a string")
                }

                projectPath = inlineTable.getString("path")
                configuration = optionalStringFromTable(inlineTable, "configuration")
            } else {
                failConfig("Embedded project ${entryPath} must be a string or inline table")
            }

            if (projectPath == null || projectPath.isBlank()) {
                failConfig("Embedded project ${entryPath} must define path")
            }
            if (!projectPath.startsWith(":")) {
                failConfig("Embedded project ${entryPath} must use a Gradle project path like :core")
            }

            if (inlineTable != null) {
                def allowedEntryKeys = ["path", "configuration"] as Set
                inlineTable.keySet().each { key ->
                    if (!allowedEntryKeys.contains(key)) {
                        failConfig("Embedded project ${entryPath} has unsupported key ${key}")
                    }
                }
            }

            embeddedProjectSpecs << [
                name         : projectKey,
                bucket       : bucketKey,
                path         : projectPath,
                configuration: configuration
            ]
        }
    }

    def duplicatePaths = embeddedProjectSpecs
        .groupBy { it.path }
        .findAll { _, specs -> specs.size() > 1 }
        .keySet()
    if (!duplicatePaths.isEmpty()) {
        failConfig("Embedded projects must not declare the same path more than once: ${duplicatePaths.join(', ')}")
    }

    embeddedProjectSpecs
}

def nativeFileNameFor = { String loadName, String platform ->
    if (platform.startsWith("windows-")) {
        return "${loadName}.dll"
    }
    if (platform.startsWith("linux-")) {
        return "lib${loadName}.so"
    }
    if (platform.startsWith("macos-")) {
        return "lib${loadName}.dylib"
    }
    failConfig("Unsupported native platform: ${platform}")
}

def parseNativeLibraryTables = { def rootTable, String prefix = "native_libraries" ->
    def nativeLibraries = []
    if (rootTable == null) {
        return nativeLibraries
    }

    rootTable.keySet().each { libraryKey ->
        def entryPath = "${prefix}.${libraryKey}"
        def table = rootTable.getTable(libraryKey)
        if (table == null) {
            failConfig("Native library ${entryPath} must be a TOML table")
        }

        table.keySet().each { key ->
            if (!allowedNativeLibraryKeys.contains(key)) {
                failConfig("Native library ${entryPath} has unsupported key ${key}")
            }
        }

        def loadName = expectStringFromTable(table, "load_name", entryPath)
        def loader = optionalStringFromTable(table, "loader", "jni")
        def platforms = expectStringArray(table, "platforms", entryPath)
        def required = optionalBooleanFromTable(table, "required", true)

        if (!allowedNativeLoaders.contains(loader)) {
            failConfig("Native library ${entryPath}.loader must be one of ${allowedNativeLoaders.join(', ')}")
        }
        if (!(libraryKey ==~ /[A-Za-z0-9_][A-Za-z0-9_.-]*/)) {
            failConfig("Native library key must start with a letter, digit, or underscore and contain only letters, digits, _, ., or -: ${libraryKey}")
        }
        if (!(loadName ==~ /[A-Za-z0-9_][A-Za-z0-9_.-]*/)) {
            failConfig("Native library ${entryPath}.load_name has unsupported characters: ${loadName}")
        }

        nativeLibraries << [
            name     : libraryKey,
            loadName : loadName,
            loader   : loader,
            platforms: platforms.collect { platform ->
                [
                    id      : platform,
                    fileName: nativeFileNameFor(loadName, platform)
                ]
            },
            required : required
        ]
    }

    nativeLibraries
}

def parseMetadataTable = { def table, String prefix = "metadata" ->
    def metadata = [
        showAsResourcePack: false,
        showAsDataPack    : false,
        logoFile          : "icon.png",
        logoBlur          : true,
        updateJsonUrl     : "",
        displayUrl        : "",
        displayTest       : "MATCH_VERSION"
    ]

    if (table == null) {
        return metadata
    }

    def allowedKeys = [
        "show_as_resource_pack",
        "show_as_data_pack",
        "logo_file",
        "logo_blur",
        "update_json_url",
        "display_url",
        "display_test"
    ] as Set

    table.keySet().each { key ->
        if (!allowedKeys.contains(key)) {
            failConfig("Unknown metadata key: ${qualifyPath(prefix, key)}")
        }
    }

    metadata.showAsResourcePack = optionalBooleanFromTable(table, "show_as_resource_pack", false)
    metadata.showAsDataPack = optionalBooleanFromTable(table, "show_as_data_pack", false)
    metadata.logoFile = optionalStringFromTable(table, "logo_file", "icon.png")
    metadata.logoBlur = optionalBooleanFromTable(table, "logo_blur", true)
    metadata.updateJsonUrl = optionalStringFromTable(table, "update_json_url")
    metadata.displayUrl = optionalStringFromTable(table, "display_url")
    metadata.displayTest = optionalStringFromTable(table, "display_test", "MATCH_VERSION")
    if (!allowedDisplayTests.contains(metadata.displayTest)) {
        failConfig("metadata.display_test must be one of ${allowedDisplayTests.join(', ')}")
    }

    metadata
}

def parseModRelationTables = { def rootTable, String prefix = "mod_relations" ->
    def relationSpecs = []
    if (rootTable == null) {
        return relationSpecs
    }

    rootTable.keySet().each { bucketKey ->
        if (!allowedRelationBuckets.contains(bucketKey)) {
            failConfig("Unknown mod relation bucket in ${prefix}: ${bucketKey}")
        }

        def bucketTable = rootTable.getTable(bucketKey)
        if (bucketTable == null) {
            failConfig("Mod relation bucket ${qualifyPath(prefix, bucketKey)} must be a TOML table")
        }

        bucketTable.keySet().each { relationKey ->
            def entryPath = "${prefix}.${bucketKey}.${relationKey}"
            def inlineTable = null
            def modId = relationKey
            def versionRange = ""
            def ordering = "NONE"
            def side = "BOTH"
            def reason = ""
            def referralUrl = ""
            def modrinthProject = ""
            def curseforgeProject = ""

            if (bucketTable.isString(relationKey)) {
                if (bucketKey == "embedded") {
                    failConfig("Embedded relation ${entryPath} must use an inline table")
                }
                versionRange = bucketTable.getString(relationKey)
            } else if (bucketTable.isTable(relationKey)) {
                inlineTable = bucketTable.getTable(relationKey)

                def allowedEntryKeys = bucketKey == "embedded"
                    ? ["modrinth", "curseforge"] as Set
                    : ["mod_id", "version_range", "ordering", "side", "reason", "referral_url", "modrinth", "curseforge"] as Set

                inlineTable.keySet().each { key ->
                    if (!allowedEntryKeys.contains(key)) {
                        failConfig("Mod relation ${entryPath} has unsupported key ${key}")
                    }
                }

                if (bucketKey != "embedded") {
                    modId = optionalStringFromTable(inlineTable, "mod_id", relationKey)
                    versionRange = optionalStringFromTable(inlineTable, "version_range")
                    ordering = optionalStringFromTable(inlineTable, "ordering", "NONE")
                    side = optionalStringFromTable(inlineTable, "side", "BOTH")
                    reason = optionalStringFromTable(inlineTable, "reason")
                    referralUrl = optionalStringFromTable(inlineTable, "referral_url")
                }

                modrinthProject = optionalStringLikeFromTable(inlineTable, "modrinth", entryPath)
                curseforgeProject = optionalStringLikeFromTable(inlineTable, "curseforge", entryPath)
            } else {
                failConfig("Mod relation ${entryPath} must be a string or inline table")
            }

            if (modId == null || modId.isBlank()) {
                failConfig("Mod relation ${entryPath} must define mod id")
            }
            if (bucketKey != "embedded") {
                if (versionRange == null || versionRange.isBlank()) {
                    failConfig("Mod relation ${entryPath} must define version_range")
                }
                if (!allowedRelationOrderings.contains(ordering)) {
                    failConfig("Mod relation ${entryPath}.ordering must be one of ${allowedRelationOrderings.join(', ')}")
                }
                if (!allowedRelationSides.contains(side)) {
                    failConfig("Mod relation ${entryPath}.side must be one of ${allowedRelationSides.join(', ')}")
                }
            }
            if (bucketKey == "embedded") {
                if ((modrinthProject == null || modrinthProject.isBlank()) && (curseforgeProject == null || curseforgeProject.isBlank())) {
                    failConfig("Mod relation ${entryPath} must define modrinth or curseforge project id")
                }
            }

            relationSpecs << [
                name             : relationKey,
                bucket           : bucketKey,
                modId            : modId,
                versionRange     : versionRange,
                ordering         : ordering,
                side             : side,
                reason           : reason,
                referralUrl      : referralUrl,
                modrinthProject  : modrinthProject,
                curseforgeProject: curseforgeProject
            ]
        }
    }

    def duplicateModIds = relationSpecs
        .findAll { it.bucket != "embedded" }
        .groupBy { "${it.bucket}:${it.modId}" }
        .findAll { _, specs -> specs.size() > 1 }
        .keySet()
    if (!duplicateModIds.isEmpty()) {
        failConfig("Mod relations must not declare the same mod id more than once in the same bucket: ${duplicateModIds.join(', ')}")
    }

    relationSpecs
}

