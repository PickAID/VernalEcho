def enabledDevPacks = []
if (devPacksTable != null) {
    devPacksTable.keySet().each { packKey ->
        if (!devPacksTable.isBoolean(packKey)) {
            failConfig("dev_packs.${packKey} must be a boolean")
        }
        if (defaultsDevPacksTable == null || defaultsDevPacksTable.getTable(packKey) == null) {
            failConfig("Unknown dev pack: ${packKey}")
        }
        if (devPacksTable.getBoolean(packKey)) {
            if (!supportedDevPacks.contains(packKey)) {
                failConfig("dev pack ${packKey} is not available on this branch")
            }
            enabledDevPacks << packKey
        }
    }
}

def devPackRepositories = [:]
def devPackDependencySpecs = []
enabledDevPacks.each { packKey ->
    def packRootPath = "dev_packs.${packKey}"
    def packTable = defaultsDevPacksTable.getTable(packKey)
    if (packTable == null) {
        failConfig("Missing default configuration for ${packRootPath}")
    }

    packTable.keySet().each { key ->
        if (!(key in ["description", "repositories", "dependencies"])) {
            failConfig("Unsupported key in ${packRootPath}: ${key}")
        }
    }

    parseRepositoryTable(packTable.getTable("repositories"), "${packRootPath}.repositories").each { repoName, repoSpec ->
        def existingSpec = devPackRepositories[repoName]
        if (existingSpec != null && existingSpec != repoSpec) {
            failConfig("Dev pack repository ${repoName} points to multiple URLs")
        }
        devPackRepositories[repoName] = repoSpec
    }

    devPackDependencySpecs.addAll(
        parseDependencyTables(packTable.getTable("dependencies"), "${packRootPath}.dependencies").collect { spec ->
            spec + [pack: packKey]
        }
    )
}

