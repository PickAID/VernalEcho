def serializePlatformRelationList = { String bucketKey, List<Map<String, String>> platformSpecs ->
    templateModRelationSpecs
        .findAll { it.bucket == bucketKey }
        .collect { relation ->
            platformSpecs.collect { platformSpec ->
                def value = relation[platformSpec.key] as String
                value == null || value.isBlank() ? null : "@${platformSpec.prefix}:${value}"
            }
        }
        .flatten()
        .findAll { it != null }
        .join(";")
}

