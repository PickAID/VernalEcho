def renderTemplateTokens = { String input, String path ->
    if (input == null || input.isBlank()) {
        return input
    }

    def matcher = (input =~ /\{([^}]+)\}/)
    matcher.each { match ->
        def token = match[1]
        if (!dependencyTokens.containsKey(token)) {
            failConfig("Unsupported token ${token} in ${path}")
        }
    }

    def rendered = input
    dependencyTokens.each { token, value ->
        rendered = rendered.replace("{${token}}", value)
    }
    rendered
}

def renderDependencySpecs = { List<Map<String, Object>> specs, String prefix ->
    specs.collect { spec ->
        def specLabel = prefix == null || prefix.isBlank() ? spec.name : "${prefix}.${spec.name}"
        def renderedNotation = renderTemplateTokens(spec.notation as String, "${specLabel}.notation")
        def renderedRange = renderTemplateTokens(spec.range as String, "${specLabel}.range")
        def notationParts = parseNotation(renderedNotation, specLabel)
        spec + [
            notation: renderedNotation,
            range   : renderedRange,
            group   : notationParts.group,
            artifact: notationParts.artifact,
            version : notationParts.version
        ]
    }
}

