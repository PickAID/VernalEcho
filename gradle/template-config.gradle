def supportedFeatures = optionalStringArray(
    platformTable,
    "supported_features",
    "platform.supported_features",
    allowedFeatures.toList().sort()
)
def allowedLanguages = ["kotlin"] as Set
def allowedNativeLibraryKeys = ["load_name", "loader", "platforms", "required"] as Set
def allowedNativeLoaders = ["jni", "jna"] as Set
def allowedOverrideToFeature = [
