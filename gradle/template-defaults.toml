# Keep this branch-specific defaults file intentionally curated. Project-level
# extras belong in project.toml via [repositories] and [dependencies.*].
defaults_revision = "neoforge-26.1.2-r1"

[platform]
loader = "neoforge"
publish_loader = "NeoForge"
mc_version = "26.1.2"
mc_range = "[26.1.2,26.2)"
loader_version = "26.1.2.30-beta"
loader_version_range = "[1,)"
java = "25"
mixin_extras_group = "io.github.llamalad7"
parchment_mappings = ""
game_test_namespace_property = "neoforge.enabledGameTestNamespaces"
supported_features = ["jei", "curios", "mixin_extras"]
supported_dev_packs = ["basic", "appleskin", "curios"]

[versions]
kotlin = "2.1.20"
jei = "29.5.0.26"
curios = "15.0.0-beta.2+26.1.2"
geckolib = ""
player_animator = ""
bendylib = ""
mixin_extras = "0.5.4"

[builtin_repositories.blamejared]
name = "Jared's Maven"
url = "https://maven.blamejared.com/"
group_regexes = ["mezz\\.jei.*"]

[builtin_repositories.sponge]
name = "sponge"
url = "https://repo.spongepowered.org/maven"
groups = ["io.github.llamalad7"]

[builtin_repositories.geckolib]
name = "GeckoLib"
url = "https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/"
groups = ["com.eliotlash.mclib"]
group_regexes = ["software\\.bernie.*"]

[builtin_repositories.curios]
name = "Curios"
url = "https://maven.theillusivec4.top/"
groups = ["top.theillusivec4.curios"]

[builtin_repositories.kosmx]
name = "KosmX's Maven"
url = "https://maven.kosmx.dev/"

[builtin_repositories.cursemaven]
name = "CurseMaven"
url = "https://cursemaven.com"
groups = ["curse.maven"]

[builtin_repositories.architectury]
name = "Architectury"
url = "https://maven.architectury.dev"
groups = ["dev.architectury"]

[builtin_repositories.latvian]
name = "Lat's Maven"
url = "https://maven.latvian.dev/releases"
groups = ["dev.latvian.mods", "dev.latvian.apps"]

[builtin_repositories.jitpack]
name = "JitPack"
url = "https://jitpack.io"
groups = ["com.github.rtyley"]

[feature_support.jei.dependencies.deobf_compile_only]
jei_common_api = "mezz.jei:jei-{mc_version}-common-api:{jei}"
jei_loader_api = "mezz.jei:jei-{mc_version}-{jei_loader}-api:{jei}"

[feature_support.jei.dependencies.deobf_runtime_only]
jei_runtime = "mezz.jei:jei-{mc_version}-{jei_loader}:{jei}"

[feature_support.curios.dependencies.deobf_compile_only]
curios = "top.theillusivec4.curios:curios-{curios_loader}:{curios}"

[feature_support.geckolib.dependencies.deobf_implementation]
geckolib = "software.bernie.geckolib:geckolib-{geckolib_loader}-{mc_version}:{geckolib}"

[feature_support.geckolib.dependencies.implementation]
mclib = "com.eliotlash.mclib:mclib:20"

[feature_support.geckolib.dependencies.additional_runtime_classpath]
mclib_runtime = "com.eliotlash.mclib:mclib:20"

[feature_support.player_animator.dependencies.deobf_implementation]
player_animator = "dev.kosmx.player-anim:player-animation-lib-{player_animator_loader}:{player_animator}"

[feature_support.player_animator.dependencies.deobf_runtime_only]
bendylib = "io.github.kosmx.bendy-lib:bendy-lib-{bendylib_loader}:{bendylib}"

[feature_support.mixin_extras.dependencies.compile_only]
mixinextras_common = "{mixin_extras_group}:mixinextras-common:{mixin_extras}"

[feature_support.mixin_extras.dependencies.annotation_processor]
mixinextras_common_processor = "{mixin_extras_group}:mixinextras-common:{mixin_extras}"

[feature_support.mixin_extras.dependencies.deobf_implementation]
mixinextras_loader = "{mixin_extras_group}:mixinextras-{mixin_extras_loader}:{mixin_extras}"

[dev_packs.basic]
description = "Basic local HUD and inspection helpers."

[dev_packs.basic.dependencies.deobf_runtime_only]
jei = "mezz.jei:jei-26.1.2-neoforge:29.5.0.26"
jade = "curse.maven:jade-324717:7938398"

[dev_packs.appleskin]
description = "AppleSkin as a standalone local HUD helper."

[dev_packs.appleskin.dependencies.deobf_runtime_only]
appleskin = "curse.maven:appleskin-248787:7854456"

[dev_packs.curios]
description = "Curios local runtime for slot and accessory integration testing."

[dev_packs.curios.dependencies.deobf_runtime_only]
curios = "top.theillusivec4.curios:curios-neoforge:15.0.0-beta.2+26.1.2"
