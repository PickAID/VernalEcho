buildscript {
    def readTemplateDefaultVersion = { String key, String fallback ->
        def source = new File(rootDir, "gradle/template-defaults.toml")
        if (!source.isFile()) {
            return fallback
        }

        def version = fallback
        def inVersions = false
        source.eachLine { line ->
            def stripped = line.replaceFirst(/#.*/, "").trim()
            if (stripped ==~ /\[[^\]]+\]/) {
                inVersions = stripped == "[versions]"
                return
            }
            if (inVersions) {
                def matcher = stripped =~ /^${java.util.regex.Pattern.quote(key)}\s*=\s*"([^"]+)"/
                if (matcher.find()) {
                    version = matcher.group(1)
                }
            }
        }
        version
    }

    def isTemplateLanguageEnabled = { String language ->
        def source = new File(rootDir, "project.toml")
        if (!source.isFile()) {
            return false
        }

        def enabled = false
        def inLanguages = false
        source.eachLine { line ->
            def stripped = line.replaceFirst(/#.*/, "").trim()
            if (stripped ==~ /\[[^\]]+\]/) {
                inLanguages = stripped == "[languages]"
                return
            }
            if (inLanguages && stripped ==~ /^${java.util.regex.Pattern.quote(language)}\s*=\s*true\b/) {
                enabled = true
            }
        }
        enabled
    }

    def kotlinPluginVersion = readTemplateDefaultVersion("kotlin", "2.1.20")

    repositories {
        maven { url "https://plugins.gradle.org/m2/" }
        mavenCentral()
    }
    dependencies {
        classpath "org.tomlj:tomlj:1.1.1"
        if (isTemplateLanguageEnabled("kotlin")) {
            classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinPluginVersion}"
        }
    }
}

