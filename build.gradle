def templatePlatform = project.ext.templatePlatform
def templateLocal = project.ext.templateLocal
def enabledDevPacks = project.ext.enabledDevPacks
def templateRepositories = project.ext.templateRepositories
def templateBuiltinDependencies = project.ext.templateBuiltinDependencies
def templateFeatureDependencies = project.ext.templateFeatureDependencies
